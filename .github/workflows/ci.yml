name: CI

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: verdandi (Vite + Vitest + ESLint) ──────────────────────────────
  verdandi:
    name: verdandi — lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verdandi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: verdandi/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx vite build

  # ── BFF: Chur (Fastify + Vitest) ────────────────────────────────────────────
  chur:
    name: Chur — test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chur
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Chur/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  # ── Backend: SHUTTLE (Quarkus + Gradle) ──────────────────────────────────────
  shuttle:
    name: SHUTTLE — test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SHUTTLE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew test
      - run: ./gradlew build -x test

  # E2E (Playwright) requires the full Docker Compose stack.
  # Run locally: docker compose up -d && cd verdandi && npm run e2e
