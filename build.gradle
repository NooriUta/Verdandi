// ─── VERDANDI monorepo — root build ──────────────────────────────────────────
//
// Subprojects:
//   :SHUTTLE     Quarkus 3 / Java 21   lineage GraphQL API      :8080
//
// Node services (not Gradle subprojects — managed via tasks below):
//   Chur         Fastify / Node 22     RBAC proxy + auth        :3000
//
// ─── Quick-start ──────────────────────────────────────────────────────────────
//   ./gradlew devAll                    start SHUTTLE + Chur together
//
// ─── Individual ───────────────────────────────────────────────────────────────
//   ./gradlew :SHUTTLE:quarkusDev       SHUTTLE in dev mode
//   ./gradlew :SHUTTLE:build            SHUTTLE fat-jar
//
//   ./gradlew churDev                   Chur  in dev mode (tsx watch)
//   ./gradlew churBuild                 Chur  compile TS → Chur/dist/
//   ./gradlew churStart                 Chur  start from dist/ (production)
//   ./gradlew churInstall               Chur  npm install

ext {
    isWindows   = System.properties['os.name'].toLowerCase().contains('windows')
    npmCmd      = isWindows ? 'npm.cmd' : 'npm'
    churDir     = file('Chur')
    gradleCmd   = new File(rootDir, isWindows ? 'gradlew.bat' : 'gradlew').canonicalPath
}

// ─── Chur tasks ───────────────────────────────────────────────────────────────

task churInstall(type: Exec) {
    group       = 'Chur'
    description = 'npm install in Chur/'
    workingDir  churDir
    commandLine npmCmd, 'install'
}

task churDev(type: Exec) {
    group       = 'Chur'
    description = 'Start Chur auth gateway in dev mode (tsx watch, :3000)'
    workingDir  churDir
    commandLine npmCmd, 'run', 'dev'
    dependsOn   churInstall
}

task churBuild(type: Exec) {
    group       = 'Chur'
    description = 'Compile Chur TypeScript → Chur/dist/'
    workingDir  churDir
    commandLine npmCmd, 'run', 'build'
    dependsOn   churInstall
}

task churStart(type: Exec) {
    group       = 'Chur'
    description = 'Start Chur from Chur/dist/ (production, :3000)'
    workingDir  churDir
    commandLine npmCmd, 'start'
    dependsOn   churBuild
}

// ─── devAll — start SHUTTLE + Chur together ───────────────────────────────────

task devAll {
    group       = 'Development'
    description = 'Start all services: SHUTTLE (:8080) + Chur (:3000)'
    dependsOn   churInstall

    doLast {
        if (isWindows) {
            // Open each service in its own console window (Windows)
            new ProcessBuilder('cmd', '/c', 'start', 'SHUTTLE :8080',
                    gradleCmd, ':SHUTTLE:quarkusDev')
                .directory(rootDir)
                .start()
            new ProcessBuilder('cmd', '/c', 'start', 'Chur :3000',
                    npmCmd, 'run', 'dev')
                .directory(churDir)
                .start()
            println '> Opened SHUTTLE (:8080) and Chur (:3000) in separate windows.'
        } else {
            // Unix/macOS — run both in parallel, inherit output to this terminal
            def shuttleProc = new ProcessBuilder(gradleCmd, ':SHUTTLE:quarkusDev')
                .directory(rootDir).inheritIO().start()
            def churProc = new ProcessBuilder(npmCmd, 'run', 'dev')
                .directory(churDir).inheritIO().start()
            Runtime.runtime.addShutdownHook(new Thread({
                shuttleProc.destroyForcibly()
                churProc.destroyForcibly()
            }))
            [shuttleProc, churProc]*.waitFor()
        }
    }
}
