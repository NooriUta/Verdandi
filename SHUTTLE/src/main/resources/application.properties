# ── Server ────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
# Internal only — rbac-proxy is the single external entry point
# In production set to 127.0.0.1; dev leaves it open for tooling
quarkus.http.host=0.0.0.0

# ── CORS — allow rbac-proxy and dev Vite ─────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User

# ── GraphQL ──────────────────────────────────────────────────────────────────
quarkus.smallrye-graphql.ui.enable=true
quarkus.smallrye-graphql.ui.always-include=true
quarkus.smallrye-graphql.ui.root-path=/graphql-ui

# ── ArcadeDB REST client ──────────────────────────────────────────────────────
quarkus.rest-client.arcade.url=http://localhost:2480
quarkus.rest-client.arcade.scope=Singleton

arcade.db=hound
arcade.user=root
arcade.password=playwithdata

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."studio.seer".level=DEBUG

# ── Dev mode ─────────────────────────────────────────────────────────────────
%dev.quarkus.smallrye-graphql.ui.always-include=true
%dev.quarkus.log.category."studio.seer".level=DEBUG
